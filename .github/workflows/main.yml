name: Smart Auto-Build (Java/Android)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Auto-Detect and Build
      run: |
        echo "Searching for build files..."
        
        # گەڕان بەدوای فایلی Gradle
        GRADLE_FILE=$(find . -name "gradlew" -type f | head -n 1)
        if [ -n "$GRADLE_FILE" ]; then
          echo "Gradle build file found at: $GRADLE_FILE"
          DIR=$(dirname "$GRADLE_FILE")
          cd "$DIR"
          chmod +x gradlew
          ./gradlew build
          exit 0
        fi
        
        # گەڕان بەدوای فایلی Maven
        POM_FILE=$(find . -name "pom.xml" -type f | head -n 1)
        if [ -n "$POM_FILE" ]; then
          echo "Maven build file found at: $POM_FILE"
          DIR=$(dirname "$POM_FILE")
          cd "$DIR"
          mvn -B package
          exit 0
        fi
        
        echo "Error: No gradlew or pom.xml found anywhere in the repository!"
        echo "Here is the structure of your repository:"
        ls -R
        exit 1
